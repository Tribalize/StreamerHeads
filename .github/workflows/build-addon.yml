name: Build StreamerHeads Add-on

on:
  workflow_dispatch:
    inputs:
      player_names:
        description: "Optional comma-separated Minecraft Java player names. Leave empty to use heads.json."
        required: false
        type: string
      heads_file:
        description: "Heads JSON file to use when player_names is empty."
        required: true
        default: "heads.json"
        type: string
      version:
        description: "Add-on version to stamp into manifests and the artifact name."
        required: true
        default: "2.1.4"
        type: string

jobs:
  build:
    name: Build .mcaddon
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build add-on
        env:
          PLAYER_NAMES: ${{ inputs.player_names }}
          HEADS_FILE: ${{ inputs.heads_file }}
          ADDON_VERSION: ${{ inputs.version }}
        run: |
          mkdir -p dist
          if [ -n "$PLAYER_NAMES" ]; then
            python buildheads.py \
              --heads "$PLAYER_NAMES" \
              --version "$ADDON_VERSION" \
              --no-version-bump \
              --require-textures \
              --output "dist/StreamerHeads-v${ADDON_VERSION}.mcaddon"
          else
            python buildheads.py \
              --heads-file "$HEADS_FILE" \
              --version "$ADDON_VERSION" \
              --no-version-bump \
              --require-textures \
              --output "dist/StreamerHeads-v${ADDON_VERSION}.mcaddon"
          fi

      - name: Upload .mcaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: StreamerHeads-v${{ inputs.version }}
          path: dist/*.mcaddon
          if-no-files-found: error
